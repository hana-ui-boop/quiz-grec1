<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Quiz Grec Ultime</title>
<style>
body { font-family: Arial; text-align:center; margin-top:30px; }
button { padding:10px 15px; margin:5px; font-size:15px; }
.card { font-size:28px; margin:25px; }
.hidden { display:none; }
.list { text-align:left; max-width:600px; margin:auto; }
</style>
</head>
<body>

<h1>📚 Quiz Grec Ultime</h1>

<div id="home">
<h2>Choisis</h2>

<h3>Mode entraînement</h3>
<button onclick="menuMode('gr-fr')">🇬🇷 → 🇫🇷</button>
<button onclick="menuMode('fr-gr')">🇫🇷 → 🇬🇷</button>

<h3>Mode contrôle</h3>
<button onclick="startControl()">🎯 Lancer un test</button>

<br><br>
<button onclick="showStats()">📊 Résultats</button>
</div>

<div id="categories" class="hidden">
<h2>Catégorie</h2>
<button onclick="startQuiz('Noms')">Noms</button>
<button onclick="startQuiz('Adjectifs')">Adjectifs</button>
<button onclick="startQuiz('Pronoms')">Pronoms</button>
<button onclick="startQuiz('Verbes')">Verbes</button>
<button onclick="startQuiz('Autres')">Autres</button>
<br><button onclick="goHome()">⬅ Retour</button>
</div>

<div id="quiz" class="hidden">
<h2 id="cat"></h2>
<div id="timer"></div>
<div class="card" id="word"></div>

<button onclick="know(true)">✅ Je sais</button>
<button onclick="know(false)">❌ Je ne sais pas</button>
<button onclick="nextWord()">▶ Suivant</button>

<br><button onclick="goHome()">⬅ Retour</button>
</div>

<div id="stats" class="hidden">
<h2>Résultats</h2>
<p id="score"></p>

<h3>✅ Réussis</h3>
<div id="good" class="list"></div>

<h3>❌ Ratés</h3>
<div id="bad" class="list"></div>

<br><button onclick="goHome()">⬅ Retour</button>
</div>

<script>

// ---------- DONNÉES (COMPLETES VALIDÉES) ----------
let categories = {

Noms: [

["δῆμος","peuple"],["ἔπαινος","éloge"],["θεός","dieu"],["λόγος","discours"],["νόμος","loi"],
["ὀβελίσκος","broche"],["οὐρανός","ciel"],["πατήρ","père"],["πλοῦτος","richesse"],
["πόλεμος","guerre"],["τύραννος","tyran"],["ὕδωρ","eau"],["χρόνος","temps"],
["ἄργυρος","argent"],["θάνατος","mort"],["τροχός","course"],["ἀνθρώπιον","petit homme"],
["ἀργύριον","argent monnayé"],["βιβλίον","livre"],["δῶρον","don"],["ζῷον","animal"],
["παιδίον","enfant"],["πόλις","cité"],["φύσις","nature"],
["ἀναρχία","anarchie"],["βωμός","autel"],["δημαγωγός","chef du peuple"],
["λογογράφος","logographe"],["σύλλογος","réunion"],["τριήραρχος","triérarque"],
["φόνος","meurtre"],["ἔργον","acte"],["πτερόν","aile"],["τέκνον","enfant"]

Adjectifs: [
["Ἀθηναῖος","athénien"],["ἄλλος","autre"],["Ἀττικός","attique"],["βάρβαρος","barbare"],
["δημοκρατικός","démocratique"],["δυνατός","capable"],["ἴδιος","privé"],["καλός","beau"],
["Λακεδαιμόνιος","lacédémonien"],["μουσικός","des Muses"],["ὀρθός","droit"],
["Περσικός","perse"],["ποιητικός","poétique"],["πολιτικός","politique"],
["ῥητορικός","rhétorique"],["σύμμαχος","allié"],["φίλος","ami"],["φανερός","évident"],
["χαλεπός","difficile"],["ἄξιος","digne (+Gen)"],["βροτός","mortel"],["δεινός","terrible"],
["δίκαιος","juste"],["ἐπιτήδειος","utile"],["ἐχθρός","ennemi"],["παλαιός","ancien"],
["σοφός","sage"],["ἄδικος","injuste"],["ἀγαθός","bon"],["ἀθάνατος","immortel"],
["ἄθεος","impie"],["ἀνδροφόνος","meurtrier"],["ἄπτερος","sans ailes"],["Βοιωτός","béotien"],
["δοῦλος","esclave"],["ἐλεύθερος","libre"],["θεῖος","divin"],["κύριος","souverain"],
["μισάνθρωπος","qui hait les hommes"],["μόνος","seul"],["νέος","jeune"],
["ὀλίγος","peu nombreux"],["πολύς","nombreux"],["ὑπεύθυνος","responsable"],
["φιλάνθρωπος","ami des hommes"],["φιλόσοφος","ami du savoir"]
],

Pronoms: [
["ἐγώ","je"],["σύ","tu"],["οὐδέν","rien"],["οὐδείς","personne"],["ὁ μέν…ὁ δέ","l’un / l’autre"]
],

Verbes: [
["διδάσκω","enseigner"],["ἐκδιδάσκω","enseigner complètement"],["δικάζω","juger"],
["ἔχω","avoir"],["κελεύω","ordonner"],["λέγω","dire"],["πτύω","cracher"],
["φροντίζω","se soucier (+Gen)"],["χαίρω","se réjouir (+Dat)"],
["ἀδικέω","être injuste"],["δοκέω","sembler"],["ποιέω","créer"],
["εἰμί","être"],["ἐστίν","il est"],["εἶναι","être (inf)"],
["ἥκω","être arrivé"],["νομίζω","penser"],["φύω","faire naître"],["πέφυκας","tu es par nature"],
["δεῖ","il faut"],["ἔξεστι","il est permis"],["μέτεστι","il y a part"],
["ἄπειμι","être absent"],["πάρειμι","être présent"],["σύνειμι","être avec"],
["ἄρχω","commander"],["διαφέρω","différer"],["ἐλπίζω","espérer"],
["ἐπιβουλεύω","comploter"],["κολακεύω","flatter"],["λύω","délier"],
["μανθάνω","apprendre"],["παραβαίνω","transgresser"],["πάσχω","subir"],
["πείθω","persuader"],["φεύγω","fuir"],["χαλεπαίνω","s’irriter"],
["ὀργίζομαι","se mettre en colère"],
["ἐπαινέω","louer"],["ἐπιχειρέω","entreprendre"],["εὐδοκιμέω","réussir"],
["κατηγορέω","accuser"],["μισέω","haïr"],["ὁμολογέω","être d’accord"],
["πολεμέω","faire la guerre"],["συγχωρέω","s’accorder"],["φιλέω","aimer"],
["χρή","il faut"]
],

Autres: [
["ἀλλά","mais"],["δέ","or"],["εἰ","si"],["καί","et"],["μάλιστα","très"],
["μόνον","seulement"],["νῦν","maintenant"],["ὀρθῶς","correctement"],
["ὅτι","que"],["πάνυ","beaucoup"],["πότερον…ἤ","est-ce que ou"],
["σφόδρα","fortement"],["τε","et"],["φανερῶς","clairement"],
["φίλως","amicalement"],["ὡς","comme"],
["γάρ","car"],["οὐ","ne pas"],["οὕτω","ainsi"],
["ἄρα","donc"],["γε","vraiment"],["μέν…δέ","d’une part…d’autre part"],
["πῶς","comment"],["τότε","alors"],
["εἰς","vers"],["ἐκ","hors de"],["ἐν","dans"],
["ἄνευ","sans"],["κατά","contre"],["περί","au sujet de"]
]

};

// ---------- LOGIQUE ----------
let words=[],current=0,wrong=[],good=[],mode="",startTime;

function menuMode(m){
mode=m;
document.getElementById("home").classList.add("hidden");
document.getElementById("categories").classList.remove("hidden");
}

function startQuiz(cat){
document.getElementById("categories").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
document.getElementById("cat").innerText=cat;

words=[...categories[cat]];
shuffle(words);
current=0;wrong=[];
showWord();
}

function startControl(){
mode="gr-fr";
words=[...Object.values(categories).flat()];
shuffle(words);
words=words.slice(0,20);
current=0;wrong=[];good=[];
startTime=Date.now();

document.getElementById("home").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
document.getElementById("cat").innerText="🎯 Mode contrôle (20 questions)";
showWord();
}

function showWord(){
if(current>=words.length){
endQuiz();
return;
}
let w=words[current];
document.getElementById("word").innerText=
mode==="gr-fr"?w[0]:w[1];
}

function know(ok){
let w=words[current];
if(ok){good.push(w);nextWord();}
else{
document.getElementById("word").innerText=
mode==="gr-fr"?w[0]+" → "+w[1]:w[1]+" → "+w[0];
wrong.push(w);
}
}

function nextWord(){current++;showWord();}

function endQuiz(){
document.getElementById("quiz").classList.add("hidden");
document.getElementById("stats").classList.remove("hidden");

let score=Math.round((good.length/words.length)*20);
let time=Math.round((Date.now()-startTime)/1000);

document.getElementById("score").innerText=
"Score : "+score+"/20 | Temps : "+time+" sec";

document.getElementById("good").innerHTML=good.map(w=>w[0]+" → "+w[1]).join("<br>");
document.getElementById("bad").innerHTML=wrong.map(w=>w[0]+" → "+w[1]).join("<br>");
}

function showStats(){
document.getElementById("home").classList.add("hidden");
document.getElementById("stats").classList.remove("hidden");
}

function goHome(){
location.reload();
}

function shuffle(a){
for(let i=a.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[a[i],a[j]]=[a[j],a[i]];
}
}

</script>

</body>
</html>
